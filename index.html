<!doctype html>
<html lang="pt-BR" dir="ltr">
  <head>
    <!-- 1. BASE: charset e viewport (obrigatório primeiro) -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- 2. TÍTULO E DESCRIÇÃO HIGH-CONVERSION / SEO -->

    <title>Criação de Sites de Alta Conversão e Lojas Virtuais | UiCode.site</title>

      name="description"
      content="UiCode é uma agência sênior de desenvolvimento web focada em criação de sites profissionais, lojas virtuais e aplicativos mobile de alta performance e conversão. Escalamos negócios digitais com tecnologia e UX estratégica."
    />
    <meta
      name="keywords"
      content="criar site, criar loja virtual, desenvolvimento web, agência digital, e-commerce, desenvolvimento de app, ui/ux design, identidade digital, uicode, site de alta conversão"
    />
    <meta name="author" content="UiCode Agency - Lucas Santos" />
    <!-- Ajuda Google a entender o foco nacional -->
    <meta name="geo.region" content="BR" />
    <meta name="geo.placename" content="Brasil" />
    
    <!-- 3. PERFORMANCE CRÍTICA -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- 4. ÍCONES, TEMA E EXPERIÊNCIA -->

    <link rel="apple-touch-icon" href="/uicode.jpeg" />
    <meta name="theme-color" content="#030303" />
    
    <!-- 5. HOME PARA MOBILE: prevenir “add to home screen” genérico -->
    <meta name="application-name" content="UiCode.site" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- 6. OPEN GRAPH (SOCIAIS) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://uicode.site/" />
    <meta property="og:site_name" content="UiCode | Agência Digital Sênior" />
    <meta property="og:title" content="UiCode | Sites de Alta Conversão e E-commerce Profissional" />

    <meta property="og:image:alt" content="UiCode Agency | Desenvolvimento de Sites e Lojas Virtuais" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- 7. TWITTER (X) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@uicode.dev" />
    <meta name="twitter:title" content="UiCode | Agência de Tecnologia e Conversão" />
    <meta
      name="twitter:description"
      content="Criamos sites, lojas virtuais e apps personalizados para negócios que querem vender mais online com tecnologia e UX profissional."
    />
    <meta name="twitter:image" content="https://uicode.site/uicode.jpeg" />
    
    <!-- 8. SEO TÉCNICO: canonical e robôs -->
    <link rel="canonical" href="https://uicode.site/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <!-- Prevenir indexação de variações de URL sem necessário -->
    <meta name="referrer" content="no-referrer, origin-when-cross-origin" />

    <!-- 11. ESTILO DE CARREGAMENTO E TEMA ESCURO (sem atrapalhar o SSR/SEO) -->
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        background-color: #030303;
        color: #f1f5f9;
        margin: 0;
        padding: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* UX: loading elegante antes do React montar */
      #root:empty {
        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
        background-color: #030303;
      }
      #root:empty::after {
        content: "";
        width: 40px;
        height: 40px;
        border: 2px solid rgba(6, 182, 212, 0.1);
        border-top-color: #06b6d4;
        border-radius: 50%;
        animation: uicode-spin 1s linear infinite;
      }
      @keyframes uicode-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <!-- 12. ALERTA SE JAVASCRIPT ESTIVER DESABILITADO -->
    <noscript>

        Para acessar a experiência completa da UiCode, por favor, ative o JavaScript no seu navegador.
      </div>
    </noscript>

    <!-- 13. CONTAINER DE APP REACT -->

    <!-- 14. SCRIPT PRINCIPAL DO APP (deve ser o último) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
